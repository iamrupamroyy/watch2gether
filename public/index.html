<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch2gether</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app" class="container">
        <!-- Initial View: Create or Join -->
        <div id="welcome-view">
            <h1>Watch2gether (Simple)</h1>
            <p>Watch videos with friends, synchronized.</p>
            
            <div class="card">
                <h2>Create a New Room</h2>
                <div class="form-group">
                    <input type="text" id="video-url-input" placeholder="Paste a direct video link (e.g., from archive.org)">
                    <button id="create-room-btn">Create Room</button>
                </div>
            </div>

            <div class="card">
                <h2>Join an Existing Room</h2>
                <div class="form-group">
                    <input type="text" id="room-code-input" placeholder="Enter Room Code">
                    <button id="join-room-btn">Join Room</button>
                </div>
            </div>
        </div>

        <!-- Room View: Video Player and Info -->
        <div id="room-view" class="hidden">
            <h2 id="room-info"></h2>
        <div id="video-container">
            <video id="video-player" controls></video>
        </div>
            <div id="host-controls" class="controls-container hidden">
                <button id="sync-btn">Force Sync</button>
            </div>
            <div id="users-progress" class="users-progress">
                <h3>Users in Room:</h3>
                <ul id="user-list">
                    <!-- User progress will be listed here -->
                </ul>
            </div>
            <p id="error-message" class="error"></p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
